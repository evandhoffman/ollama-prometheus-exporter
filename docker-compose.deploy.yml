services:
  ollama-prometheus-exporter:
    image: evandhoffman/ollama-prometheus-exporter:latest
    container_name: ollama-prometheus-exporter
    restart: unless-stopped
    ports:
      - "9497:9497"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      EXPORTER_HOST: 0.0.0.0
      EXPORTER_PORT: "9497"
      OLLAMA_TIMEOUT_SECONDS: "5.0"
      OLLAMA_VERIFY_TLS: "true"
      LOG_LEVEL: INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
